---
# Publish crates to crates.io in dependency order.
#
# c2c depends on api, so api must be live on crates.io before c2c is published
# (c2c's publish-verify build resolves api from the registry, not the local path).
# Because all crates share one version (workspace.package.version), a single
# release tag publishes the whole set in order. Each crate is skipped if its
# current version is already published, so pushing either tag (or both) is safe
# and idempotent.
name: publish crates
on:
  push:
    tags:
      - 'bity-ic-storage-canister-*'
jobs:
  publish:
    name: Publish crates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Publish api then c2c in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_API_TOKEN }}
          # Use the runner-provided env var (not a ${{ }} interpolation) to avoid
          # any workflow-injection surface from the tag name.
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          # Tag format: bity-ic-storage-canister-<crate>-<version>. The crate
          # names (api, c2c) contain no '-', so stripping up to the first '-'
          # leaves the version (incl. any prerelease suffix).
          rest="${TAG_NAME#bity-ic-storage-canister-}"
          version="${rest#*-}"
          echo "Releasing workspace version ${version}"

          # GET returns 200 if the exact version is already on crates.io, 404 if
          # not. crates.io rejects requests without a User-Agent.
          is_published() {
            curl -sf -o /dev/null \
              -H "User-Agent: ic-storage-canister-ci" \
              "https://crates.io/api/v1/crates/$1/${version}"
          }

          publish_crate() {
            local dir="$1" name="$2"
            if is_published "${name}"; then
              echo "${name} ${version} already published, skipping."
              return 0
            fi
            echo "Publishing ${name} ${version}..."
            (cd "${dir}" && cargo publish)
            # Wait for the index to reflect the new version before publishing a
            # crate that depends on it.
            for _ in $(seq 1 30); do
              if is_published "${name}"; then
                echo "${name} ${version} is live."
                return 0
              fi
              echo "Waiting for ${name} ${version} to appear on crates.io..."
              sleep 10
            done
            echo "Timed out waiting for ${name} ${version} on crates.io." >&2
            return 1
          }

          publish_crate api bity-ic-storage-canister-api
          publish_crate c2c bity-ic-storage-canister-c2c
